<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRFit IA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

/* BODY */
body{
background: radial-gradient(circle at top, #1c1c1e, #0b0b0c 75%);
color:white;
display:flex;
min-height:100dvh;
overflow:hidden;
}
html, body{
    height: 100%;
}
body.menu-open{
    overflow:hidden
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
height: 100%;
}

/* HEADER */
header{
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(30px);
border-bottom:1px solid rgba(255,255,255,0.06);
}

header h3{
font-weight:600;
}

/* BOTÓN MENU (solo móvil) */
.menu-btn{
display:none;
font-size:18px;
cursor:pointer;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth; /* Mantiene scroll suave */
}

/* MENSAJES */
.msg{
max-width:75%;
padding:14px 18px;
border-radius:22px;
line-height:1.4;
animation:fade .25s ease;
}

/* BOT */
.bot{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.05);
}

/* USER */
.user{
background:linear-gradient(135deg,#22c55e,#16a34a);
align-self:flex-end;
box-shadow:0 6px 20px rgba(34,197,94,0.3);
}

/* INPUT */
.input-area{
display:flex;
gap:10px;
padding:10px 12px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(25px);
border-top:1px solid rgba(255,255,255,0.05);
position:sticky; /* Mantiene el input fijo abajo */
z-index:50;
bottom: 0;
}
.input-area input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.07);
color:white;
outline:none;
}
.input-area button{
padding:0 16px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}
.input-area button:hover{
    transform:scale(1.05);
}

input{
flex:1;
padding:14px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.07);
color:white;
outline:none;
}

button{
padding:0 18px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* SIDEBAR */
.sidebar{
width:250px;
background:rgba(15,15,15,0.85);
backdrop-filter:blur(30px);
padding:25px 20px;
display:flex;
flex-direction:column;
gap:15px;
border-left:1px solid rgba(255,255,255,0.06);
transition:.3s;
}

.sidebar h2{
font-size:18px;
margin-bottom:10px;
}

.sidebar button,
.sidebar a{
text-decoration:none;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
border:none;
color:#ddd;
font-size:14px;
cursor:pointer;
transition:.2s;
text-align:left;
}

.sidebar button:hover,
.sidebar a:hover{
background:rgba(34,197,94,0.2);
color:white;
}
.menu-btn{
display:none;
font-size: 22px;
cursor: pointer;
}
/* OCULTAR SIDEBAR EN MÓVIL */
/* RESPONSIVE CELULAR */
@media(max-width:768px){
.menu-btn{
    display: block;
}

/* HEADER */
header{
flex-direction:row;
justify-content: space-between;
align-items:center;
padding:12px 16px;
width: 100%;
}

/* MAIN se adapta al ancho completo */
.main{
    flex:1;
    display: flex;
    flex-direction: column;
    width: 100%;
}
/* CHAT */
.chat{
padding:10px;
gap:10px;
flex:1;
overflow-y:auto;
}

.msg{
max-width:90%;
font-size:14px;
padding:12px 16px;
}

/* INPUT */
.input-area{
flex-direction:row;
gap:8px;
padding:10px;
position:sticky;
bottom:0;
width:100%;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(20px);
z-index:50;
}

.input-area input{
    font-size: 14px;
    padding: 12px;
}
.input-area button{
    font-size: 14px;
    padding: 0 14px
}
/* SIDEBAR MOBILE FIX */
@media(max-width:768px){

.sidebar{
position: fixed;
top: 0;
right: -260px;
height: 100%;
width: 240px;

padding:20px;

background: rgba(15, 15, 15, 0.95);
backdrop-filter: blur(30px);

display:flex;
flex-direction: column;
gap:12px;

transition: .3s ease;
z-index: 200;
}

/* 🔥 CORREGIDO (antes estaba mal escrito) */
.sidebar.show{
right: 0;
}

} }

.sidebar h2{
    font-size: 16px;
}
.sidebar a, .sidebar button{
padding:12px;
border-radius:12px;
font-size:15px;
transition:.2s;
}

.sidebar a:active,
.sidebar button:active{
transform:scale(0.96);
background:rgba(34,197,94,0.2);
}

/* ANIM */
@keyframes fade{
from{opacity:0; transform:translateY(8px);}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="main">

<header>
<h3>CRFit IA</h3>
<span class="menu-btn" onclick="toggleMenu(event)">☰</span>
</header>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Escribe tu rutina o pregunta...">
<button onclick="send()">Enviar</button>
</div>

</div>

<!-- SIDEBAR DERECHA -->
<div class="sidebar" id="sidebar">
<h2>Menú</h2>

<button onclick="newChat()">🆕 Nuevo Chat</button>
<button onclick="clearChat()">🧹 Limpiar Chat</button>

<a href="index.html">🏠 Inicio</a>
<a href="rutinas.html"> Rutinas</a>
<a href="productos.html">🛒 Productos</a>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* =========================
  🧠 MEMORIA GLOBAL
========================= */
let memory = JSON.parse(localStorage.getItem("memory")) || {
name: "",
goal: ""
};

/* =========================
  💬 CHATS
========================= */
let chats = JSON.parse(localStorage.getItem("chats")) || [];
let currentChat = null;

/* CREAR CHAT */
function newChat(){
currentChat = {
id: Date.now(),
messages: []
};
chats.push(currentChat);
saveChats();
renderChat();
addMessage("🆕 Nuevo chat iniciado","bot");
}

/* GUARDAR CHATS */
function saveChats(){
localStorage.setItem("chats", JSON.stringify(chats));
}

/* RENDER CHAT */
function renderChat(){
chat.innerHTML="";
if(!currentChat) return;

currentChat.messages.forEach(m=>{
add(m.text, m.type, false);
});
}

/* =========================
  ✍️ MENSAJES
========================= */
function add(text,type,save=true){
const div = document.createElement("div");
div.className = "msg " + type;
div.innerHTML = text;
chat.appendChild(div);

/* 🔥 SOLO SCROLL SI YA ESTÁ ABAJO */
const isNearBottom = chat.scrollHeight - chat.scrollTop <= chat.clientHeight + 50;

if(isNearBottom){
   chat.scrollTop = chat.scrollHeight;
}

if(save && currentChat){
currentChat.messages.push({text,type});
saveChats();
}
}


/* ANIMACIÓN ESCRIBIR */

function typeMessage(text){
const div = document.createElement("div");
div.className="msg bot";
chat.appendChild(div);

let words = text.split(" "), i=0;

let interval = setInterval(()=>{
div.innerHTML += words[i] + " ";

const isNearBottom = chat.scrollHeight - chat.scrollTop <= chat.clientHeight + 50;

if(isNearBottom){
chat.scrollTop = chat.scrollHeight;
}

i++;
if(i>=words.length) clearInterval(interval);
},40);

if(currentChat){
currentChat.messages.push({text,type:"bot"});
saveChats();
}
}



/* =========================
  🚀 ENVIAR
========================= */
function send(){
const text = input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

setTimeout(()=>{
reply(text.toLowerCase());
},500);
}

/* =========================
  🧠 IA
========================= */
function reply(t){

/* ---- MEMORIA ---- */
if(t.includes("me llamo")){
memory.name = t.split("me llamo")[1].trim();
saveMemory();
return typeMessage(` Mucho gusto ${memory.name}, voy a ayudarte a mejorar físicamente`);
}

if(t.includes("quiero") && t.includes("musculo")){
memory.goal="musculo";
saveMemory();
return typeMessage(" Perfecto, vamos a enfocarnos en hipertrofia, fuerza y buena alimentación");
}

if(t.includes("bajar")){
memory.goal="bajar";
saveMemory();
return typeMessage("🔥 Vamos a trabajar en quema de grasa con cardio y control de dieta");
}

/* ---- RESPUESTAS ---- */
let nombre = memory.name ? memory.name : "bro";

if(t.includes("hola")){
return typeMessage(` Hola ${nombre}, ¿qué quieres entrenar hoy?`);
}
if(t.includes("Holaa")){
return typeMessage("Holaa en que te ayudo?? 😊");
}
if(t.includes("ondaa")){
return typeMessage("Que ondaaaaaa ");
}

if(t.includes("diseño")){
return typeMessage("Me diseño Sebastian Salazar, el creador del sitio web CRfit");
}

if(t.includes("que hago hoy")){
if(memory.goal==="musculo"){
return typeMessage("🔥 Hoy te recomiendo una rutina de fuerza: pecho + tríceps, con peso alto y buena técnica");
}
if(memory.goal==="bajar"){
return typeMessage(" Hoy toca cardio + rutina ligera para quemar grasa y mantener músculo");
}
return typeMessage(" Podemos hacer una rutina completa, dime qué quieres entrenar");
}

if(t.includes("pecho")){
return typeMessage("🔥 Haz press banca, inclinado y aperturas. Concéntrate en controlar cada repetición y llegar cerca del fallo");
}

if(t.includes("pierna")){
return typeMessage(" Sentadilla, prensa y peso muerto. Pierna fuerte = cuerpo fuerte");
}

if(t.includes("dieta")){
if(memory.goal==="musculo"){
return typeMessage("🍗 Come más proteína, carbohidratos y mantén un superávit calórico");
}
if(memory.goal==="bajar"){
return typeMessage("🥗 Déficit calórico, proteína alta y evita azúcares");
}
return typeMessage("🥗 Mantén una dieta balanceada con proteína, grasas sanas y carbohidratos");
}

if(t.includes("motivacion")){
return typeMessage("🔥 No necesitas motivación todos los días, necesitas disciplina constante");
}
if(t.includes("verdad")){
return typeMessage("Si te lo digo de verdad, soy una IA diseñada para darte info de rutinas y de salud");
}
if(t.includes("creador")){
return typeMessage("El creador del sitio web CRfit es Sebastian Salazar");
}
if(t.includes("entrenador")){
return typeMessage("Una de nuestras entrenadoras es Angie Aguilera Diaz, proximamente vamos a tener mas info sobre nuestros entrenadores");
}
if(t.includes("Empecemos")){
return typeMessage("Perfecto, entonces dime con que quieres empezar y te doy la info");
}
if(t.includes("15")){
return typeMessage("Si tienes 15 años entonces las rutinas intermedias te pueden servir, ve a la parte de rutinas y busca la info");
}
if(t.includes("20")){
return typeMessage("Si tienes 20 años entonces ya puedes tener mas experincia en ejercicios, te recomendamos llevar algunos ejercicios de la parte avanzada de rutinas");
}
//chistes
if(t.includes("pez")){
return typeMessage(" No estoy diseñado para chistes, pero dimelo para no quedarme con la duda");
}
if(t.includes("peces")){
return typeMessage(" Mejor ve a entrenar en ves de estar diciendo estupideces");
}
if(t.includes("jaja")){
return typeMessage(" Que bueno que te rias, pero ahora es hora de entrenar");
}
if(t.includes("creatina")){
return typeMessage(" Si quieres creatina en nuestra tienda tenemos a la venta diferentes tipos de creatina");
}
if(t.includes("no me gusta")){
return typeMessage(" Estamos trabajando en hacer mejor el sitio web CRfit, en un tiempo ya va a tener mejores cosas");
}
if(t.includes("la mejor parte")){
return typeMessage(" La mejor parte del sitio web depende de tus preferencias");
}
if(t.includes("compre")){
return typeMessage(" Si no te ha llegado lo que compraste contacta con alguien que este a cargo de CRfit, nos puedes encontrar en Cartago");
}
if(t.includes("que puedo comer")){
return typeMessage("Comer saludable no tiene que ser complicado. Te dejo ideas 🥗 Opciones saludables para el día: Desayuno • Avena con frutas (banano, fresas, manzana) • Huevos con pan integral              --      Almuerzo • Arroz + pollo a la plancha + ensalada • Pescado + vegetales + papa o yuca "
);
}

if(t.includes("gracias")){
return typeMessage(" Con gusto, te puedo ayudar en otra cosa?");
}
if(t.includes("keyla")){
return typeMessage(" Que es una sapa y cae mal 🙄");
}

if(t.includes("siento mal")){
return typeMessage(" Y porque te sientes mal? 🥺");
}






/* DEFAULT */
return typeMessage("🤔 No entendí del todo, pero puedo ayudarte con rutinas, dieta o entrenamiento");
}

/* =========================
  💾 MEMORIA
========================= */
function saveMemory(){
localStorage.setItem("memory", JSON.stringify(memory));
}

/* =========================
  🧹 LIMPIAR
========================= */
function clearChat(){
if(currentChat){
currentChat.messages=[];
saveChats();
renderChat();
}
}

/* =========================
  ⌨️ ENTER
========================= */
input.addEventListener("keypress", e=>{
if(e.key==="Enter") send();
});

/* =========================
  🔥 INICIO
========================= */
if(chats.length === 0){
newChat();
}else{
currentChat = chats[chats.length-1];
renderChat();
}

if(memory.name){
typeMessage(` Bienvenido de nuevo ${memory.name}!!`);
}else{
typeMessage("🔥 Bienvenido a CRFit IA");
}
// MENU HAMBURGUESA
const sidebar = document.getElementById("sidebar");
const menuBtn = document.querySelector(".menu-btn");

function toggleMenu(e){
    e.stopPropagation();
sidebar.classList.toggle("show");
document.body.classList.toggle("menu-open")
}

// Cerrar menu al hacer clic fuera del sidebar
document.addEventListener("click", (e)=>{
if(window.innerWidth <= 768){
if(
!sidebar.contains(e.target) &&
!e.target.closest(".menu-btn")
){
    sidebar.classList.remove("show");
document.body.classList.remove("menu-open");
}
}
});
</script>

</body>
</html>
