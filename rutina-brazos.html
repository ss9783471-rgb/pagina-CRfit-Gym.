<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brazos | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background: radial-gradient(circle at top,#1c1c1e,#0a0a0a 85%);
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(20,20,20,.7);
backdrop-filter:blur(25px);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
z-index:100;
}

header h2{ color:#22c55e; }

nav a{
color:#ccc;
margin-left:18px;
text-decoration:none;
}
nav a:hover{ color:#22c55e; }

/* HERO */
.hero{
height:520px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("v-gym.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:3.5rem;
color:#22c55e;
}

.hero p{
font-size:1.1rem;
max-width:750px;
color:#bbb;
margin:auto;
}

/* CONTENEDOR */
.container{
max-width:1250px;
margin:auto;
padding:60px 25px;
}

/* 🔥 NIVELES */
.niveles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:50px;
}

.nivel-card{
padding:25px;
border-radius:25px;
cursor:pointer;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);

transition:.35s;
position:relative;
overflow:hidden;
}

.nivel-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.nivel-card.active{
border:1px solid #22c55e;
box-shadow:0 0 30px rgba(34,197,94,.3);
}

/* INFO */
.info{
text-align:center;
margin-bottom:40px;
}

.info h2{
color:#22c55e;
font-size:1.8rem;
}

.info p{
max-width:850px;
margin:auto;
color:#bbb;
}

/* 🔥 TARJETAS PRO */
.ejercicios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.ejercicio{
position:relative;

background:rgba(255,255,255,0.04);
backdrop-filter:blur(30px);

border-radius:28px;
overflow:hidden;

border:1px solid rgba(255,255,255,0.06);

box-shadow:
0 10px 40px rgba(0,0,0,0.7),
inset 0 1px 0 rgba(255,255,255,0.05);

transition:.4s;
}

.ejercicio:hover{
transform:translateY(-10px) scale(1.02);

box-shadow:
0 25px 70px rgba(0,0,0,0.9),
0 0 40px rgba(34,197,94,0.2);
}

.ejercicio img{
width:100%;
height:220px;
object-fit:cover;
transition:.4s;
}

.ejercicio:hover img{
transform:scale(1.05);
}

.content{
padding:22px;
}

.content h3{
font-size:1.25rem;
margin-bottom:5px;
}

.content span{
color:#22c55e;
font-weight:bold;
}

.content p{
margin-top:10px;
color:#bbb;
}

/* RESPONSIVE */
@media(max-width:700px){

.hero{
height:420px;
}

.hero h1{
font-size:2.2rem;
}

.ejercicios{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header>
<h2>CRFit Gym</h2>
<nav>
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a href="productos.html">Productos</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Rutina de Brazos </h1>
<p>Desarrolla bíceps y tríceps con máxima intensidad y volumen.</p>
</div>
</section>

<main class="container">

<div class="niveles">

<div class="nivel-card active" onclick="cambiarNivel('principiante',this)">
<h3>🔥 Principiante</h3>
<p>Base y técnica</p>
</div>

<div class="nivel-card" onclick="cambiarNivel('intermedio',this)">
<h3>⚡ Intermedio</h3>
<p>Volumen y fuerza</p>
</div>

<div class="nivel-card" onclick="cambiarNivel('avanzado',this)">
<h3>💀 Avanzado</h3>
<p>Máxima intensidad</p>
</div>

</div>

<div class="info" id="info"></div>

<div class="ejercicios" id="ejercicios"></div>

</main>

<footer style="text-align:center;padding:25px;color:#777;">
© 2026 CRFit Gym
</footer>

<script>
const data = {
principiante:{
info:{
titulo:"Nivel Principiante",
texto:"Aprende técnica y activa correctamente los músculos."
},
ejercicios:[
{nombre:"Curl mancuernas",tipo:"Bíceps",img:"img/biceps1.jpg",desc:"3x12 repeticiones"},
{nombre:"Fondos asistidos",tipo:"Tríceps",img:"img/triceps1.jpg",desc:"3x10"},
{nombre:"Curl martillo",tipo:"Bíceps",img:"img/biceps2.jpg",desc:"3x12"}
]
},

intermedio:{
info:{
titulo:"Nivel Intermedio",
texto:"Más volumen con cargas moderadas."
},
ejercicios:[
{nombre:"Curl barra",tipo:"Bíceps",img:"img/biceps3.jpg",desc:"4x10"},
{nombre:"Extensión polea",tipo:"Tríceps",img:"img/triceps2.jpg",desc:"4x12"},
{nombre:"Curl concentrado",tipo:"Bíceps",img:"img/biceps4.jpg",desc:"3x10"}
]
},

avanzado:{
info:{
titulo:"Nivel Avanzado",
texto:"Máxima intensidad y fuerza."
},
ejercicios:[
{nombre:"Curl pesado",tipo:"Bíceps",img:"img/biceps5.jpg",desc:"5x6-8"},
{nombre:"Fondos lastrados",tipo:"Tríceps",img:"img/triceps3.jpg",desc:"4x8"},
{nombre:"Extensión francesa",tipo:"Tríceps",img:"img/triceps4.jpg",desc:"4x10"}
]
}
};

function cambiarNivel(n,el){

document.querySelectorAll(".nivel-card")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");

document.getElementById("info").innerHTML=`
<h2>${data[n].info.titulo}</h2>
<p>${data[n].info.texto}</p>
`;

document.getElementById("ejercicios").innerHTML=
data[n].ejercicios.map(e=>`
<div class="ejercicio">
<img src="${e.img}">
<div class="content">
<h3>${e.nombre}</h3>
<span>${e.tipo}</span>
<p>${e.desc}</p>
</div>
</div>
`).join("");
}

cambiarNivel("principiante", document.querySelector(".nivel-card"));
</script>

</body>
</html>
