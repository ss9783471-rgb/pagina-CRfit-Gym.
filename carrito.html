<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Checkout | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

/* 🔥 BODY FULL SCREEN REAL (FIX MÓVIL) */
html, body{
height:100%;
}

body{
background:#0f0f0f;
color:#fff;
display:flex;
flex-direction:column;
overflow:hidden; /* 🔥 evita que todo se mueva */
}

/* HEADER */
header{
flex-shrink:0;
background:#000;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.6);
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
height:45px;
}

/* 🔥 CONTENEDOR PRINCIPAL SCROLL INTERNO */
.container{
flex:1;
overflow-y:auto; /* 🔥 SOLO SCROLL AQUÍ */
padding:20px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:25px;
}

/* BOXES */
.cart-box,
.form-box{
background:#151515;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

/* CART */
.cart-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #333;
font-size:14px;
}

.cart-total{
margin-top:15px;
font-size:20px;
font-weight:bold;
color:#1ed760;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:12px;
}

input,select{
padding:14px;
border:none;
border-radius:10px;
background:#222;
color:#fff;
font-size:14px;
}

/* 🔥 EVITA ZOOM EN IOS */
input, select {
font-size:16px;
}

/* CAMPOS TARJETA */
.payment-fields{
display:none;
flex-direction:column;
gap:10px;
}

/* BOTÓN */
button{
margin-top:10px;
padding:15px;
background:linear-gradient(135deg,#1db954,#1ed760);
border:none;
font-weight:bold;
cursor:pointer;
border-radius:12px;
color:#000;
transition:.2s;
}

button:active{
transform:scale(.97);
}

/* FACTURA */
.factura{
display:none;
flex:1;
overflow-y:auto;
padding:20px;
}

.factura-box{
max-width:600px;
margin:auto;
background:#151515;
padding:25px;
border-radius:16px;
text-align:center;
}

.factura-item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:8px 0;
}

.factura-total{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#1ed760;
}

/* 📱 MOBILE PERFECTO */
@media(max-width:900px){

.container{
grid-template-columns:1fr;
gap:15px;
padding:15px;
}

/* 🔥 NO USAR MARGIN GRANDE (causa el bug) */
body{
height:100vh;
}

/* HEADER MÁS COMPACTO */
header{
padding:12px 15px;
}

.brand img{
height:40px;
}

.cart-box,
.form-box{
padding:15px;
}

}
</style>
</head>

<body>

<header>
<div class="brand">
<img src="logoCRfit.png">
<h2>CRFit Gym</h2>
</div>
</header>

<!-- CHECKOUT -->
<main class="container" id="checkout">

<!-- RESUMEN -->
<div class="cart-box">
<h2>🛒 Resumen de compra</h2>
<div id="items"></div>
<div class="cart-total">
Total: ₡<span id="total">0</span>
</div>
</div>

<!-- FORM -->
<div class="form-box">
<h2>Datos del cliente</h2>

<form onsubmit="finalizar(event)">

<input required placeholder="Nombre completo">
<input type="email" required placeholder="Correo electrónico">
<input required placeholder="Teléfono">
<input required placeholder="Dirección de entrega">

<select id="metodoPago" required onchange="cambiarPago()">
<option value="">Seleccionar método de pago</option>
<option value="tarjeta">Tarjeta</option>
<option value="sinpe">SINPE Móvil</option>
<option value="entrega">Pago contra entrega</option>
</select>

<div class="payment-fields" id="tarjetaCampos">
<input placeholder="Número de tarjeta">
<input placeholder="Nombre en la tarjeta">
<input placeholder="MM/AA">
<input placeholder="CVV">
</div>

<button>Pagar ahora</button>

</form>
</div>

</main>

<!-- FACTURA -->
<div class="factura" id="factura">
<div class="factura-box">
<h2>🎉 ¡Pago realizado con éxito!</h2>
<p>Gracias por comprar en CRFit Gym</p>

<div id="facturaItems"></div>

<div class="factura-total">
Total pagado: ₡<span id="facturaTotal">0</span>
</div>

<br>
<button onclick="volver()">Volver a la tienda</button>
</div>
</div>

<script>
const carrito = JSON.parse(sessionStorage.getItem("carrito")) || [];
const items = document.getElementById("items");
const total = document.getElementById("total");

let suma = 0;

if(carrito.length === 0){
items.innerHTML = "<p>Tu carrito está vacío 🛒</p>";
}else{
carrito.forEach(p=>{
let subtotal = p.precio * p.cantidad;
suma += subtotal;

items.innerHTML += `
<div class="cart-item">
<span>${p.nombre} x${p.cantidad}</span>
<span>₡${subtotal.toLocaleString()}</span>
</div>
`;
});
}

total.textContent = suma.toLocaleString();

function cambiarPago(){
const metodo = document.getElementById("metodoPago").value;
const tarjeta = document.getElementById("tarjetaCampos");

tarjeta.style.display = metodo === "tarjeta" ? "flex" : "none";
}

function finalizar(e){
e.preventDefault();

if(carrito.length === 0){
alert("No hay productos en el carrito");
return;
}

document.getElementById("checkout").style.display="none";

const factura = document.getElementById("factura");
const facturaItems = document.getElementById("facturaItems");
const facturaTotal = document.getElementById("facturaTotal");

factura.style.display="flex";

facturaItems.innerHTML = "";

let totalPago = 0;

carrito.forEach(p=>{
let subtotal = p.precio * p.cantidad;
totalPago += subtotal;

facturaItems.innerHTML += `
<div class="factura-item">
<span>${p.nombre} x${p.cantidad}</span>
<span>₡${subtotal.toLocaleString()}</span>
</div>
`;
});

facturaTotal.textContent = totalPago.toLocaleString();

sessionStorage.removeItem("carrito");
}

function volver(){
window.location.href="productos.html";
}
</script>

</body>
</html>
