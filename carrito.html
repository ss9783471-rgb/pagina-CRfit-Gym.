<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | CRFit Gym</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}
body{
background:#0f0f0f;
color:#fff;
}
/* HEADER */
header{
background:#000;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,.6);
}
.brand{
display:flex;
align-items:center;
gap:12px;
}
.brand img{
height:50px;
}
/* CONTAINER */
.container{
max-width:1100px;
margin:40px auto;
padding:20px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:40px;
}
/* RESUMEN CARRITO */
.cart-box{
background:#151515;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.6);
}
.cart-box h2{
margin-bottom:20px;
}
.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #333;
font-size:14px;
}
.cart-total{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#1ed760;
}
/* FORM */
.form-box{
background:#151515;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.6);
}
.form-box h2{
margin-bottom:20px;
}
form{
display:flex;
flex-direction:column;
gap:14px;
}
input,select{
padding:14px;
border:none;
border-radius:6px;
background:#222;
color:#fff;
}
.payment-fields{
display:none;
flex-direction:column;
gap:12px;
}
button{
margin-top:10px;
padding:15px;
background:linear-gradient(135deg,#1db954,#1ed760);
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
color:#000;
transition:.3s;
}
button:hover{
transform:scale(1.03);
}
/* FACTURA FINAL */
.factura{
display:none;
max-width:600px;
margin:60px auto;
background:#151515;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.7);
}
.factura h2{
color:#1ed760;
margin-bottom:20px;
}
.factura-items{
margin:20px 0;
text-align:left;
}
.factura-item{
display:flex;
justify-content:space-between;
border-bottom:1px solid #333;
padding:8px 0;
}
.factura-total{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#1ed760;
}
/* RESPONSIVE */
@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>
<header>
<div class="brand">
<img src="logoCRfit.png">
<h2>CRFit Gym</h2>
</div>
</header>
<!-- CHECKOUT -->
<main class="container" id="checkout">
<!-- RESUMEN -->
<div class="cart-box">
<h2>🛒 Resumen de compra</h2>
<div id="items"></div>
<div class="cart-total">
Total: ₡<span id="total">0</span>
</div>
</div>
<!-- FORM -->
<div class="form-box">
<h2>Datos del cliente</h2>
<form onsubmit="finalizar(event)">
<input required placeholder="Nombre completo">
<input type="email" required placeholder="Correo electrónico">
<input required placeholder="Teléfono">
<input required placeholder="Dirección de entrega">
<select id="metodoPago" required onchange="cambiarPago()">
<option value="">Seleccionar método de pago</option>
<option value="tarjeta">Tarjeta</option>
<option value="sinpe">SINPE Móvil</option>
<option value="entrega">Pago contra entrega</option>
</select>
<div class="payment-fields" id="tarjetaCampos">
<input placeholder="Número de tarjeta">
<input placeholder="Nombre en la tarjeta">
<input placeholder="MM/AA">
<input placeholder="CVV">
</div>
<button>Pagar ahora</button>
</form>
</div>
</main>
<!-- FACTURA FINAL -->
<div class="factura" id="factura">
<h2>🎉 ¡Pago realizado con éxito!</h2>
<p>Gracias por comprar en CRFit Gym</p>
<div class="factura-items" id="facturaItems"></div>
<div class="factura-total">
Total pagado: ₡<span id="facturaTotal">0</span>
</div>
<br>
<button onclick="volver()">Volver a la tienda</button>
</div>
<script>
const carrito = JSON.parse(sessionStorage.getItem("carrito")) || [];
const items = document.getElementById("items");
const total = document.getElementById("total");
let suma = 0;
/* MOSTRAR PRODUCTOS */
carrito.forEach(p=>{
let subtotal = p.precio * p.cantidad;
suma += subtotal;
items.innerHTML += `
<div class="cart-item">
<span>${p.nombre} x${p.cantidad}</span>
<span>₡${subtotal.toLocaleString()}</span>
</div>
`;
});
total.textContent = suma.toLocaleString();
/* MOSTRAR CAMPOS TARJETA */
function cambiarPago(){
const metodo = document.getElementById("metodoPago").value;
const tarjeta = document.getElementById("tarjetaCampos");
tarjeta.style.display = metodo === "tarjeta" ? "flex" : "none";
}
/* FINALIZAR COMPRA */
function finalizar(e){
e.preventDefault();
document.getElementById("checkout").style.display="none";
const factura = document.getElementById("factura");
const facturaItems = document.getElementById("facturaItems");
const facturaTotal = document.getElementById("facturaTotal");
factura.style.display="block";
let totalPago=0;
carrito.forEach(p=>{
let subtotal = p.precio * p.cantidad;
totalPago += subtotal;
facturaItems.innerHTML += `
<div class="factura-item">
<span>${p.nombre} x${p.cantidad}</span>
<span>₡${subtotal.toLocaleString()}</span>
</div>
`;
});
facturaTotal.textContent = totalPago.toLocaleString();
sessionStorage.removeItem("carrito");
}
/* VOLVER A LA TIENDA */
function volver(){
window.location.href="productos.html";
window.location.href="tiendaRopa.html"
}
</script>
</body>
</html>
