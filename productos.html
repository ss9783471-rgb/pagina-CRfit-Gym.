<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body{
background: radial-gradient(circle at top,#1c1c1e,#0a0a0a 80%);
color:white;
}
html, body{
    height: 100%;
    overflow-x: hidden;
}
/* evita zoom y scroll raro en el cel */
input, textarea{
    font-size: 16px;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
background:rgba(20,20,20,.55);
backdrop-filter:blur(40px);
padding:15px;
border-bottom:1px solid rgba(255,255,255,.05);
}
.top{
display:flex;
justify-content:space-between;
align-items:center;
gap: 10px
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
height:40px;
}
.menu a{
position:relative;
padding:8px 14px;
border-radius:12px;
color:#ccc;
text-decoration:none;
font-size:14px;

transition:.25s;
}

/* TEXTO */
.menu a:hover{
color:#22c55e;
}

/* LÍNEA ANIMADA PRO */
.menu a::after{
content:"";
position:absolute;
left:10px;
bottom:4px;

width:0%;
height:2px;

background:linear-gradient(90deg,#22c55e,#4ade80);
border-radius:2px;

transition:.3s;
}

/* ACTIVACIÓN */
.menu a:hover::after{
width:70%;
}

/* EFECTO CLICK iOS */
.menu a:active{
transform:scale(0.95);
}

/* BUSCADOR */
.search-bar{
margin-top:12px;
}

.search-bar input{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.06);
backdrop-filter: 25s;
color:white;
outline:none;
}

/* CATEGORÍAS */
.categories{
display:flex;
gap:10px;
margin-top:12px;
overflow-x:auto;
scroll-snap-type: mandatory;
padding-bottom: 5px;
}

.categories button{
flex-shrink: 0;
scroll-snap-align: start;

padding:10px 18px;
border-radius:999px;
border:none;
background:rgba(255,255,255,0.06);
color:#ccc;
font-weight:600;
cursor:pointer;
}

.categories button.active,
.categories button:hover{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
}

/* CARRITO FLOAT */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(135deg,#22c55e,#16a34a);
padding:14px 18px;
border-radius:999px;
font-weight:600;
cursor:pointer;
box-shadow:0 10px 30px rgba(34,197,94,.4);
z-index:200;
}

/* GRID */
.container{
padding: 190px 25px 30px;
max-width:1200px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:28px;
}

/* CARD */
.product{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:22px;
padding:15px;
border:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
transition:.3s;
}

.product:hover{
transform:translateY(-6px) scale(1.02);
}

.product img{
width:100%;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

.price{
color:#22c55e;
font-weight:bold;
margin-bottom:10px;
}

.product button{
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
}

.product button.disabled{
background:#333;
color:#777;
cursor:not-allowed;
}
/* PANEL CARRITO PRO */
.cart{
position:fixed;
top:0;
right:-100%;
width:100%;
max-width:380px;
height:100%;
background:rgba(20,20,20,0.85);
backdrop-filter:blur(30px);
padding:20px;
transition:.4s cubic-bezier(.22,.61,.36,1);
z-index:300;
overflow:auto;
border-left:1px solid rgba(255,255,255,0.08);
box-shadow:-10px 0 40px rgba(0,0,0,.8);
}

.cart.active{
right:0;
}

.cart h2{
margin-bottom:15px;
font-weight:600;
letter-spacing:.5px;
}

/* ITEM */
.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
font-size:14px;
animation:fadeUp .3s ease;
}

/* CONTROLES */
.cart-controls{
display:flex;
gap:6px;
}

/* BOTONES + - */
.cart-controls button{
width:34px;
height:34px;
border:none;
border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;
font-weight:600;

color:white;
cursor:pointer;

/* GLASS */
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);

/* profundidad */
box-shadow:
0 4px 12px rgba(0,0,0,.4),
inset 0 1px 0 rgba(255,255,255,0.1);

transition:.25s;
}
/* HOVER */
.cart-controls button:hover{
transform:scale(1.12);

/* verde CRFit */
background:linear-gradient(135deg,#22c55e,#16a34a);

box-shadow:
0 6px 18px rgba(34,197,94,.5),
0 0 10px rgba(34,197,94,.4);
}
/* CLICK (efecto iOS) */
.cart-controls button:active{
transform:scale(0.9);
}
.cart-controls button:hover{
background:linear-gradient(135deg,#22c55e,#16a34a);
transform:scale(1.1);
box-shadow:0 5px 15px rgba(34,197,94,.4);
}

/* TOTAL */
.cart h3{
margin-top:20px;
font-size:20px;
color:#22c55e;
}

/* BOTÓN PAGAR PRO */
.cart button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:16px;
font-weight:600;
font-size:15px;
cursor:pointer;

background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;

box-shadow:0 10px 25px rgba(34,197,94,.4);
transition:.3s;
}

.cart button:hover{
transform:scale(1.05);
box-shadow:0 15px 35px rgba(34,197,94,.6);
}

/* EFECTO GLASS EXTRA */
.cart::before{
content:"";
position:absolute;
inset:0;
border-radius:0;
background:linear-gradient(
120deg,
rgba(255,255,255,0.15),
transparent 40%
);
opacity:.1;
pointer-events:none;
}


/* RESPONSIVE */
@media(max-width:768px){

/* HEADER más compacto */
header{
padding:10px;
}
.container{
    padding: 210px 15px 30px;
}
/* menu mas usable*/
.menu a{
    font-size: 13px;
    padding: 6px 10px;
}

/* productos mejor acomodados */
.products{
padding: 12px;
}
.product img{
    height: 120px;
}

/* carrito más cómodo */
.cart{
max-width:100%;
border-left: none;
}

}
</style>
</head>

<body>

<header>
<div class="top">
<div class="brand">
<img src="logoCRfit.png">
<h3>CRFit</h3>
</div>

<div class="menu">
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a href="maquinas.html">Máquinas</a>
</div>
</div>

<div class="search-bar">
<input type="text" placeholder="🔍 Buscar..." oninput="buscar(this.value)">
</div>

<div class="categories">
<button class="active" onclick="filtrar('todos',this)">Ver todo</button>
<button onclick="filtrar('suplementos',this)">Suplementos</button>
<button onclick="filtrar('alimentos',this)">Alimentos</button>
<button onclick="filtrar('bebidas',this)">Bebidas</button>
</div>
</header>

<div class="cart-btn" onclick="toggleCart()">
🛒 (<span id="count">0</span>)
</div>

<main class="container">
<div class="products" id="lista"></div>
</main>

<div class="cart" id="cart">
<h2>Carrito</h2>
<div id="cartItems"></div>
<h3>Total: ₡<span id="total">0</span></h3>
<button onclick="irAPago()">Ir a pagar</button>
</div>

<script>

const productos = [/* TODOS TUS PRODUCTOS EXACTOS */
{nombre:"Proteína Whey", categoria:"suplementos", precio:32000, img:"v_proteina.jpg", stock:40},
{nombre:"Proteína Dos pinos", categoria:"suplementos", precio:28000, img:"v_proteinaDospinos.webp", stock:40},
{nombre:"Barras de proteina fresa", categoria:"suplementos", precio:18000, img:"v_barra bar.webp", stock:10},
{nombre:"Creatina Plus", categoria:"suplementos", precio:20000, img:"v_productos3.jpg", stock:8},
{nombre:"Galletas Fit", categoria:"galletas", precio:3500, img:"https://m.media-amazon.com/images/I/71SE-CKOJYL.jpg", stock:40},
{nombre:"Galletas nutri snacks", categoria:"galletas", precio:3500, img:"v_galletasFit1.png", stock:40},
{nombre:"Galletas nutri snacks", categoria:"galletas", precio:3500, img:"v_galletasFit2.png", stock:40},
{nombre:"Galletas nutri snacks", categoria:"galletas", precio:3500, img:"v_galletasFit3.webp", stock:40},
{nombre:"Chocolate fit", categoria:"galletas", precio:3500, img:"v_chocolateFit.jpg", stock:40},
{nombre:"Barra Energética", categoria:"fit", precio:2000, img:"img/barra.jpg", stock:40},
{nombre:"Granola", categoria:"fit", precio:12000, img:"v_granola.webp", stock:40},
{nombre:"FitNess cereal chocolate", categoria:"fit", precio:32000, img:"v_fitNess.png", stock:20},
{nombre:"FitNess cereal vainilla", categoria:"suplementos", precio:32000, img:"v_fitNess1.png", stock:20},
{nombre:"Barras de proteina", categoria:"suplementos", precio:28000, img:"v_barra de granola.webp", stock:40},
{nombre:"Creatina x4", categoria:"suplementos", precio:18000, img:"v_creatinaX4.jpeg", stock:40},
{nombre:"Barra de proteina", categoria:"suplementos", precio:20000, img:"v_barra de protreina.jpeg", stock:40},
{nombre:"Barra Tosh chocolate", categoria:"fit", precio:2000, img:"v_barraTosh.png", stock:40},
{nombre:"Barra Tosh zero fresa", categoria:"fit", precio:2000, img:"v_barraTosh2.png", stock:40},
{nombre:"Barra Energética frutas", categoria:"fit", precio:2000, img:"v_barraTosh3.png", stock:40},
{nombre:"Barra Energética frutas", categoria:"fit", precio:2000, img:"v_barraTosh4.png", stock:40},
{nombre:"Barra Energética frutas", categoria:"fit", precio:2000, img:"v_barraTosh5.png", stock:40},
{nombre:"bebida suerox", categoria:"fit", precio:12000, img:"v_bebida suerox1.webp", stock:40},
{nombre:"bebida suerox", categoria:"fit", precio:32000, img:"v_bebida suerox2.webp", stock:10},
{nombre:"Fit Frida banana", categoria:"fit", precio:12000, img:"v_fit.jpg", stock:10},
{nombre:"bebida suerox", categoria:"fit", precio:32000, img:"", stock:40}
];

let carrito=[];

/* RENDER */
function render(arr){
lista.innerHTML="";
arr.forEach((p,i)=>{
lista.innerHTML+=`
<div class="product">
<img src="${p.img || 'https://via.placeholder.com/150'}">
<h3>${p.nombre}</h3>
<div class="price">₡${p.precio.toLocaleString()}</div>
<button ${p.stock<=0?"class='disabled'":""} onclick="agregar(${i})">
${p.stock<=0?"Agotado":"Agregar"}
</button>
</div>`;
});
}

/* AGREGAR SIN RECARGAR */
function agregar(i){
const p=productos[i];
if(p.stock<=0)return;

p.stock--;

let ex=carrito.find(x=>x.nombre===p.nombre);
if(ex){ex.cantidad++;}
else{carrito.push({...p,cantidad:1});}

actualizarCarrito();
render(productos);
}

/* CARRITO */
function actualizarCarrito(){
let total=0, count=0;
cartItems.innerHTML="";

carrito.forEach((p,i)=>{
total+=p.precio*p.cantidad;
count+=p.cantidad;

cartItems.innerHTML+=`
<div class="cart-item">
<span>${p.nombre} x${p.cantidad}</span>
<div class="cart-controls">
<button onclick="restar(${i})">-</button>
<button onclick="sumar(${i})">+</button>
</div>
</div>`;
});

/* 🔥 GUARDAR PARA OTRA PÁGINA */
sessionStorage.setItem("carrito", JSON.stringify(carrito));

document.getElementById("total").textContent=total.toLocaleString();
document.getElementById("count").textContent=count;
}
function sumar(i){
if(productos[i].stock<=0) return;

carrito[i].cantidad++;
productos[i].stock--;

actualizarCarrito();
render(productos);
}

function restar(i){
carrito[i].cantidad--;

if(carrito[i].cantidad <= 0){
carrito.splice(i,1);
}

actualizarCarrito();
render(productos);
}
function irAPago(){
if(carrito.length === 0){
alert("El carrito está vacío");
return;
}

/* 🔥 GUARDAR ANTES DE IR */
sessionStorage.setItem("carrito", JSON.stringify(carrito));

window.location.href="carrito.html";
}


/* BUSCAR */
function buscar(txt){
render(productos.filter(p=>p.nombre.toLowerCase().includes(txt.toLowerCase())));
}

/* FILTRAR */
function filtrar(cat,btn){
document.querySelectorAll(".categories button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

let f;

if(cat==="todos") f=productos;
else if(cat==="alimentos") f=productos.filter(p=>p.categoria==="galletas"||p.categoria==="fit");
else if(cat==="bebidas") f=productos.filter(p=>p.nombre.toLowerCase().includes("bebida"));
else f=productos.filter(p=>p.categoria===cat);

render(f);
}

function toggleCart(){
cart.classList.toggle("active");
}

function irAPago(){
window.location.href="carrito.html";
}

render(productos);

const searchInput = document.querySelector(".search-bar input");

searchInput.addEventListener("focus", ()=>{
document.body.style.position = "fixed";
document.body.style.width = "100%";
});

searchInput.addEventListener("blur", ()=>{
document.body.style.position = "";
});

</script>

</body>
</html>
