<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hombros | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background: radial-gradient(circle at top,#1c1c1e,#0a0a0a 80%);
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(20,20,20,.7);
backdrop-filter:blur(25px);
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
z-index:100;
}

header h2{ color:#22c55e; }

nav a{
color:#ccc;
text-decoration:none;
margin-left:15px;
}
nav a:hover{ color:#22c55e; }

/* HERO */
.hero{
height:360px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("v-gym.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:2.5rem;
color:#22c55e;
}

.hero p{
color:#bbb;
max-width:600px;
margin:auto;
}

/* CONTENEDOR */
.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* 🔥 NIVELES COMO CARDS */
.niveles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.nivel-card{
padding:25px;
border-radius:22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:.3s;
text-align:center;
}

.nivel-card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 10px 40px rgba(34,197,94,.2);
}

.nivel-card.active{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:black;
}

.nivel-card h3{
margin-bottom:5px;
}

/* INFO */
.info{
text-align:center;
margin-bottom:30px;
}

.info h2{
color:#22c55e;
}

/* EJERCICIOS */
.ejercicios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.ejercicio{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:.3s;
}

.ejercicio:hover{
transform:translateY(-8px);
box-shadow:0 15px 40px rgba(0,0,0,.7);
}

.ejercicio img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.content span{
color:#22c55e;
font-size:13px;
}

/* RESPONSIVE */
@media(max-width:600px){
.hero h1{font-size:1.8rem;}
}
</style>
</head>

<body>

<header>
<h2>CRFit Gym</h2>
<nav>
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a href="productos.html">Productos</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Rutina de Hombros</h1>
<p>Entrenamiento completo para deltoides fuertes, estéticos y definidos.</p>
</div>
</section>

<main class="container">

<!-- 🔥 NIVELES MODERNOS -->
<div class="niveles">
<div class="nivel-card active" onclick="cambiarNivel('principiante',this)">
<h3>🔥 Principiante</h3>
<p>Aprende técnica</p>
</div>

<div class="nivel-card" onclick="cambiarNivel('intermedio',this)">
<h3>⚡ Intermedio</h3>
<p>Más intensidad</p>
</div>

<div class="nivel-card" onclick="cambiarNivel('avanzado',this)">
<h3>💀 Avanzado</h3>
<p>Máximo rendimiento</p>
</div>
</div>

<div class="info" id="info"></div>

<div class="ejercicios" id="ejercicios"></div>

</main>

<script>
const data = {
principiante:{
info:{
titulo:"Nivel Principiante",
texto:"Rutina ideal para aprender técnica y fortalecer los hombros sin riesgo."
},
ejercicios:[
{nombre:"Press en máquina",tipo:"Deltoide frontal",img:"img/hombro1.jpg",desc:"3x12 repeticiones"},
{nombre:"Elevaciones laterales",tipo:"Deltoide lateral",img:"img/hombro2.jpg",desc:"3x15 repeticiones"},
{nombre:"Pájaros",tipo:"Deltoide posterior",img:"img/hombro3.jpg",desc:"3x15 repeticiones"}
]
},

intermedio:{
info:{
titulo:"Nivel Intermedio",
texto:"Mayor volumen y estabilidad con ejercicios compuestos."
},
ejercicios:[
{nombre:"Press militar",tipo:"Deltoide frontal",img:"img/hombro4.jpg",desc:"4x10"},
{nombre:"Elevaciones laterales",tipo:"Deltoide lateral",img:"img/hombro5.jpg",desc:"3x12"},
{nombre:"Face pull",tipo:"Posterior",img:"img/hombro6.jpg",desc:"3x15"}
]
},

avanzado:{
info:{
titulo:"Nivel Avanzado",
texto:"Alta intensidad para hipertrofia y fuerza máxima."
},
ejercicios:[
{nombre:"Press pesado",tipo:"Deltoide frontal",img:"img/hombro7.jpg",desc:"5x5"},
{nombre:"Laterales pesados",tipo:"Lateral",img:"img/hombro8.jpg",desc:"4x10"},
{nombre:"Pájaros polea",tipo:"Posterior",img:"img/hombro9.jpg",desc:"4x12"}
]
}
};

function cambiarNivel(n,el){

document.querySelectorAll(".nivel-card")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");

document.getElementById("info").innerHTML=`
<h2>${data[n].info.titulo}</h2>
<p>${data[n].info.texto}</p>
`;

document.getElementById("ejercicios").innerHTML=
data[n].ejercicios.map(e=>`
<div class="ejercicio">
<img src="${e.img}">
<div class="content">
<h3>${e.nombre}</h3>
<span>${e.tipo}</span>
<p>${e.desc}</p>
</div>
</div>
`).join("");
}

cambiarNivel("principiante", document.querySelector(".nivel-card"));
</script>

</body>
</html>
