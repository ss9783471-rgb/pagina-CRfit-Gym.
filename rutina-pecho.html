<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecho | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body{
background: radial-gradient(circle at top,#1c1c1e,#0a0a0a 80%);
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(20,20,20,.6);
backdrop-filter:blur(25px);
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

header h2{
color:#22c55e;
}

nav a{
color:#aaa;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:#22c55e;
}

/* HERO */
.hero{
height:350px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("v-gym.jpg") center/cover;
}

.hero h1{
font-size:2.5rem;
color:#22c55e;
}

/* CONTAINER */
.container{
max-width:1100px;
margin:auto;
padding:50px 20px;
}

/* 🔥 NIVELES TIPO CARDS */
.levels{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:50px;
}

.level{
padding:25px;
border-radius:25px;
cursor:pointer;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);

transition:.35s;
position:relative;
overflow:hidden;
}

.level::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#22c55e33,transparent 60%);
top:-50%;
left:-50%;
opacity:0;
transition:.5s;
}

.level:hover::before{
opacity:1;
}

.level:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 60px rgba(0,0,0,.7);
}

.level.active{
border:1px solid #22c55e;
box-shadow:0 0 30px rgba(34,197,94,.3);
}

.level h3{
margin-bottom:10px;
}

.level p{
color:#aaa;
font-size:14px;
}

/* INFO */
.info{
text-align:center;
margin-bottom:40px;
}

.info h2{
color:#22c55e;
}

/* EJERCICIOS */
.ejercicios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.ejercicio{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:22px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:.3s;
}

.ejercicio:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.ejercicio img{
width:100%;
height:200px;
object-fit:cover;
}

.ejercicio .content{
padding:18px;
}

.ejercicio span{
color:#22c55e;
font-size:13px;
}

/* RESPONSIVE */
@media(max-width:600px){
.hero h1{
font-size:1.8rem;
}
}
</style>
</head>

<body>

<header>
<h2>CRFit Gym</h2>
<nav>
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a href="productos.html">Productos</a>
</nav>
</header>

<section class="hero">
<h1>Rutina de Pecho</h1>
</section>

<main class="container">

<!-- 🔥 NUEVO SISTEMA DE NIVELES -->
<div class="levels">
<div class="level active" onclick="cambiarNivel(this,'principiante')">
<h3>🔥 Principiante</h3>
<p>Aprende técnica y activa el pecho correctamente.</p>
</div>

<div class="level" onclick="cambiarNivel(this,'intermedio')">
<h3>⚡ Intermedio</h3>
<p>Más volumen y control muscular.</p>
</div>

<div class="level" onclick="cambiarNivel(this,'avanzado')">
<h3>💀 Avanzado</h3>
<p>Máxima intensidad y fuerza.</p>
</div>
</div>

<div class="info" id="info"></div>
<div class="ejercicios" id="ejercicios"></div>

</main>

<script>
const data={
principiante:{
info:{titulo:"Nivel Principiante",texto:"Rutina ideal para iniciar sin riesgo."},
ejercicios:[
{nombre:"Press máquina",tipo:"Pecho",img:"img/pecho1.jpg",desc:"3x12"},
{nombre:"Aperturas",tipo:"Pecho",img:"img/pecho2.jpg",desc:"3x15"},
{nombre:"Flexiones",tipo:"Pecho",img:"img/pecho3.jpg",desc:"3x10"}
]
},
intermedio:{
info:{titulo:"Nivel Intermedio",texto:"Mayor volumen y crecimiento."},
ejercicios:[
{nombre:"Press banca",tipo:"Pecho",img:"img/pecho4.jpg",desc:"4x10"},
{nombre:"Inclinado",tipo:"Pecho superior",img:"img/pecho5.jpg",desc:"3x12"},
{nombre:"Aperturas",tipo:"Pecho",img:"img/pecho6.jpg",desc:"3x12"}
]
},
avanzado:{
info:{titulo:"Nivel Avanzado",texto:"Alta intensidad para hipertrofia."},
ejercicios:[
{nombre:"Press pesado",tipo:"Pecho",img:"img/pecho7.jpg",desc:"5x5"},
{nombre:"Inclinado barra",tipo:"Superior",img:"img/pecho8.jpg",desc:"4x8"},
{nombre:"Fondos",tipo:"Pecho",img:"img/pecho9.jpg",desc:"4x8"}
]
}
};

function cambiarNivel(el,n){
document.querySelectorAll(".level").forEach(x=>x.classList.remove("active"));
el.classList.add("active");

info.innerHTML=`
<h2>${data[n].info.titulo}</h2>
<p>${data[n].info.texto}</p>
`;

ejercicios.innerHTML=data[n].ejercicios.map(e=>`
<div class="ejercicio">
<img src="${e.img}">
<div class="content">
<h3>${e.nombre}</h3>
<span>${e.tipo}</span>
<p>${e.desc}</p>
</div>
</div>
`).join("");
}

cambiarNivel(document.querySelector(".level.active"),'principiante');
</script>

</body>
</html>
