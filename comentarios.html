<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reseña | CRFit Gym</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}
body{
background:#0b0b0b;
color:white;
}
/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
padding:0 50px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
z-index:100;
}
.logo{
display:flex;
align-items:center;
gap:15px;
}
.logo img{
height:130px;
transform:translateY(15px);
}
nav ul{
list-style:none;
display:flex;
gap:30px;
}
nav a{
color:white;
text-decoration:none;
font-weight:bold;
}
nav a:hover{
color:#1db954;
}
/* CONTENIDO */
main{
padding-top:140px;
max-width:900px;
margin:auto;
padding-left:25px;
padding-right:25px;
}
h1{
text-align:center;
margin-bottom:40px;
font-size:2.4rem;
}
/* FORM */
.review-box{
background:#161616;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}
form{
display:flex;
flex-direction:column;
gap:20px;
}
input, textarea{
padding:12px;
border:none;
border-radius:10px;
background:#222;
color:white;
}
textarea{
resize:none;
height:120px;
}
/* ESTRELLAS */
.stars{
display:flex;
gap:10px;
font-size:28px;
cursor:pointer;
}
.star{
color:#555;
transition:.2s;
}
.star.active{
color:#1db954;
}
/* BOTON */
button{
padding:14px;
border:none;
border-radius:30px;
background:#1db954;
color:black;
font-weight:bold;
cursor:pointer;
}
/* RESULTADO */
.resultado{
margin-top:50px;
display:none;
background:#161616;
padding:30px;
border-radius:20px;
text-align:center;
}
.avatar{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}
.comentario{
margin-top:10px;
color:#ccc;
font-style:italic;
}
.rating{
margin-top:8px;
color:#1db954;
font-size:22px;
}
/* VOLVER */
.volver{
display:block;
margin:40px auto;
text-align:center;
width:200px;
padding:12px;
background:#1db954;
border-radius:25px;
color:black;
text-decoration:none;
font-weight:bold;
}
/* FOOTER */
footer{
margin-top:80px;
padding:25px;
text-align:center;
background:#121212;
color:#888;
}
/* RESPONSIVE */
@media(max-width:700px){
header{
padding:0 20px;
}
.logo img{
height:110px;
}
.review-box{
padding:25px;
}
}
</style>
</head>
<body>
<header>
<div class="logo">
<img src="logoCRfit.png">
<strong>CRFit Gym</strong>
</div>
<nav>
<ul>
<li><a href="pagina-inicio.html">Inicio</a></li>
<li><a href="rutinas.html">Rutinas</a></li>
<li><a href="productos.html">Productos</a></li>
<li><a href="musica.html">Música</a></li>
</ul>
</nav>
</header>
<main>
<h1>Dejá tu reseña sobre CRFit</h1>
<div class="review-box">
<form onsubmit="publicar(event)">
<input id="nombre" placeholder="Tu nombre" required>
<input id="foto" placeholder="URL de tu foto (opcional)">
<label>Calificación</label>
<div class="stars" id="stars">
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>
<textarea id="comentario" placeholder="Escribe tu experiencia con CRFit..." required></textarea>
<button>Publicar reseña</button>
</form>
</div>
<div class="resultado" id="resultado"></div>
<a class="volver" href="index.html">Volver al inicio</a>
</main>
<footer>
© 2026 CRFit Gym
</footer>
<script>
let rating=0
const stars=document.querySelectorAll(".star")
stars.forEach(star=>{
star.addEventListener("click",()=>{
rating=star.dataset.value
stars.forEach(s=>{
s.classList.remove("active")
if(s.dataset.value<=rating){
s.classList.add("active")
}
})
})
})
function publicar(e){
e.preventDefault()
const nombre=document.getElementById("nombre").value
const comentario=document.getElementById("comentario").value
const foto=document.getElementById("foto").value || ""
const estrellas="⭐".repeat(rating)
const box=document.getElementById("resultado")
box.innerHTML=`
<img src="${foto}" class="avatar">
<h3>${nombre}</h3>
<div class="rating">${estrellas}</div>
<p class="comentario">"${comentario}"</p>
`
box.style.display="block"
}
</script>
</body>
</html>
