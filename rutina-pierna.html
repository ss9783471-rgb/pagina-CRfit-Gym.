<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piernas | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body{
background: radial-gradient(circle at top,#1c1c1e,#0a0a0a 80%);
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(20,20,20,.6);
backdrop-filter:blur(25px);
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
z-index:100;
}

header h2{
color:#22c55e;
font-size:18px;
}

nav a{
color:#aaa;
margin-left:15px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#22c55e;
}

/* HERO */
.hero{
height:300px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("v-gym.jpg") center/cover;
}

.hero h1{
font-size:2rem;
color:#22c55e;
}

/* CONTAINER */
.container{
max-width:1100px;
margin:auto;
padding:40px 15px;
}

/* 🔥 NIVELES */
.levels{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:40px;
}

.level{
padding:20px;
border-radius:22px;
cursor:pointer;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);

transition:.3s;
position:relative;
overflow:hidden;
}

.level::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#22c55e33,transparent 60%);
top:-50%;
left:-50%;
opacity:0;
transition:.4s;
}

.level:hover::before{
opacity:1;
}

.level:hover{
transform:translateY(-6px);
}

.level.active{
border:1px solid #22c55e;
box-shadow:0 0 25px rgba(34,197,94,.3);
}

.level h3{
margin-bottom:8px;
font-size:15px;
}

.level p{
font-size:13px;
color:#aaa;
}

/* INFO */
.info{
text-align:center;
margin-bottom:35px;
animation:fade .4s ease;
}

.info h2{
color:#22c55e;
}

/* EJERCICIOS */
.ejercicios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.ejercicio{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:.3s;
animation:fadeUp .4s ease;
}

.ejercicio:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,.6);
}

.ejercicio img{
width:100%;
height:180px;
object-fit:cover;
}

.ejercicio .content{
padding:15px;
}

.ejercicio h3{
font-size:14px;
}

.ejercicio span{
color:#22c55e;
font-size:12px;
}

.ejercicio p{
font-size:13px;
color:#bbb;
margin-top:5px;
}

/* ANIM */
@keyframes fade{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#777;
margin-top:40px;
}

/* 📱 RESPONSIVE */
@media(max-width:600px){

header{
flex-direction:column;
gap:10px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.hero{
height:220px;
}

.hero h1{
font-size:1.5rem;
}

.container{
padding:25px 10px;
}

.level{
padding:15px;
}

}
</style>
</head>

<body>

<header>
<h2>CRFit Gym</h2>
<nav>
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a href="productos.html">Productos</a>
</nav>
</header>

<section class="hero">
<h1>Rutina de Piernas</h1>
</section>

<main class="container">

<!-- 🔥 CARDS DE NIVEL -->
<div class="levels">
<div class="level active" onclick="cambiarNivel(this,'principiante')">
<h3>🔥 Principiante</h3>
<p>Base y técnica correcta.</p>
</div>

<div class="level" onclick="cambiarNivel(this,'intermedio')">
<h3>⚡ Intermedio</h3>
<p>Fuerza + resistencia.</p>
</div>

<div class="level" onclick="cambiarNivel(this,'avanzado')">
<h3>💀 Avanzado</h3>
<p>Máxima intensidad.</p>
</div>
</div>

<div class="info" id="info"></div>
<div class="ejercicios" id="ejercicios"></div>

</main>

<footer>
© 2026 CRFit Gym · Piernas fuertes
</footer>

<script>
const data = {
principiante:{
info:{
titulo:"Nivel Principiante",
texto:"Rutina para aprender la técnica correcta y fortalecer piernas sin riesgo de lesión."
},
ejercicios:[
{nombre:"Sentadilla asistida",tipo:"Cuádriceps",img:"img/pierna1.jpg",desc:"3x12 repeticiones"},
{nombre:"Elevación de talones",tipo:"Pantorrillas",img:"img/pierna2.jpg",desc:"3x15 repeticiones"},
{nombre:"Puente de glúteos",tipo:"Glúteos",img:"img/pierna3.jpg",desc:"3x15 repeticiones"}
]
},

intermedio:{
info:{
titulo:"Nivel Intermedio",
texto:"Entrenamiento con más intensidad, combinando fuerza y resistencia."
},
ejercicios:[
{nombre:"Sentadilla libre",tipo:"Cuádriceps",img:"img/pierna4.jpg",desc:"4x10 repeticiones"},
{nombre:"Peso muerto rumano",tipo:"Isquiotibiales",img:"img/pierna5.jpg",desc:"4x12 repeticiones"},
{nombre:"Zancadas con mancuernas",tipo:"Glúteos",img:"img/pierna6.jpg",desc:"3x12 repeticiones"}
]
},

avanzado:{
info:{
titulo:"Nivel Avanzado",
texto:"Rutina intensa para fuerza máxima y volumen muscular."
},
ejercicios:[
{nombre:"Sentadilla profunda",tipo:"Cuádriceps",img:"img/pierna7.jpg",desc:"5x5"},
{nombre:"Peso muerto rígido",tipo:"Isquiotibiales",img:"img/pierna8.jpg",desc:"4x8"},
{nombre:"Saltos pliométricos",tipo:"Explosividad",img:"img/pierna9.jpg",desc:"4x12"}
]
}
};

function cambiarNivel(el,n){
document.querySelectorAll(".level").forEach(x=>x.classList.remove("active"));
el.classList.add("active");

info.innerHTML=`
<h2>${data[n].info.titulo}</h2>
<p>${data[n].info.texto}</p>
`;

ejercicios.innerHTML=data[n].ejercicios.map(e=>`
<div class="ejercicio">
<img src="${e.img}">
<div class="content">
<h3>${e.nombre}</h3>
<span>${e.tipo}</span>
<p>${e.desc}</p>
</div>
</div>
`).join("");
}

cambiarNivel(document.querySelector(".level.active"),'principiante');
</script>

</body>
</html>
