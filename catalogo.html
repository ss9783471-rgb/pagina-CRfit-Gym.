<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | CRFit Gym</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0b0b0b;color:#fff}
/* HEADER */
header{
 background:#000;padding:15px 40px;display:flex;align-items:center;justify-content:space-between;
 position:sticky;top:0;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.6);flex-wrap:wrap;gap:10px
}
.logo{display:flex;align-items:center;gap:12px}
.logo img{height:90px}
.logo span{font-size:1.6rem;font-weight:bold}
nav{display:flex;align-items:center;gap:25px}
nav a{color:#fff;text-decoration:none;font-weight:bold;opacity:.9}
nav a:hover{color:#1db954}
.msg-btn{
 background:linear-gradient(135deg,#1db954,#16a34a);padding:10px 22px;border-radius:30px;
 color:#000;font-weight:bold;box-shadow:0 8px 20px rgba(29,185,84,.45);transition:.3s
}
.msg-btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(29,185,84,.7)}
.search-box{width:360px;max-width:100%}
.search-box input{
 width:100%;padding:12px 18px;border-radius:30px;border:none;background:#1a1a1a;color:#fff;outline:none
}
/* TITULOS */
.section-title{font-size:28px;margin:40px 0 25px;text-align:center}
/* CARRUSEL REBAJAS */
.sale-carousel{
 max-width:1300px;margin:auto;overflow:hidden;margin-bottom:40px;position:relative
}
.carousel-track{
 display:flex;gap:25px;transition:transform .6s ease;will-change:transform
}
.carousel-card{
 min-width:260px;max-width:260px;background:#141414;border-radius:18px;overflow:hidden;cursor:pointer;
 transition:.3s;position:relative
}
.carousel-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,.8)}
.carousel-card img{width:100%;height:200px;object-fit:cover}
.carousel-info{padding:15px}
.sale{position:absolute;top:10px;left:10px;background:#e11d48;padding:5px 10px;font-size:12px;border-radius:20px}
.price{color:#1db954;font-size:1.1rem}
.old{text-decoration:line-through;color:#888;font-size:14px;margin-right:8px}
/* GRID */
.grid{
 max-width:1300px;margin:auto;display:grid;
 grid-template-columns:repeat(auto-fill,260px);justify-content:center;gap:30px;padding-bottom:40px
}
/* CARD */
.card{
 background:#141414;border-radius:18px;overflow:hidden;cursor:pointer;transition:all .35s ease;
 position:relative;width:260px
}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 25px 60px rgba(0,0,0,.9)}
.card img{width:100%;height:200px;object-fit:cover;transition:transform .4s ease}
.card:hover img{transform:scale(1.08)}
.card-content{padding:18px}
/* OVERLAY */
.card-overlay{
 position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.3));
 display:flex;align-items:center;justify-content:center;opacity:0;transition:.3s
}
.card:hover .card-overlay{opacity:1}
.view-btn{
 padding:12px 30px;border:none;border-radius:30px;background:#1db954;font-weight:bold;cursor:pointer
}
/* PRODUCT VIEW */
section{display:none;padding:40px}
section.active{display:block}
.product-view{
 max-width:1100px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:40px
}
.product-view img{width:100%;border-radius:20px}
.buy{
 margin-top:25px;padding:15px 40px;border:none;border-radius:30px;background:#1db954;font-weight:bold;cursor:pointer
}
.back{margin-bottom:25px;background:none;border:none;color:#1db954;font-weight:bold;cursor:pointer}
/* RESPONSIVE */
@media(max-width:900px){
 header{justify-content:center}
 .product-view{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
<div class="logo">
<img src="logoCRfit.png" alt="CRFit">
<span>CRFit Gym</span>
</div>
<div class="search-box">
<input id="searchInput" placeholder="Buscar máquinas o equipos...">
</div>
<nav>
<a href="pagina-inicio.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a class="msg-btn" href="mensajes.html">Enviar mensaje</a>
</nav>
</header>
<section id="sale" class="active">
<h2 class="section-title">🔥 Productos en rebaja</h2>
<div class="sale-carousel">
<div class="carousel-track" id="saleGrid"></div>
</div>
<h2 class="section-title"> Catálogo completo</h2>
<div class="grid" id="grid"></div>
</section>
<section id="product">
<button class="back" onclick="showSection('sale')">← Volver</button>
<div class="product-view" id="productView"></div>
</section>
<script>
/* PRODUCTOS */
const products=[
{name:"MultiGym impulse",price:1600000,sale:1400000,img:"https://media.nidux.net/pull/600/800/13624/6278-product-6835e75800bd4-fl02100-001.jpg"},
{name:"cardio caminadora",price:950000,sale:820000,img:"https://media.nidux.net/pull/600/800/13624/6277-product-68ac7d8bd7cd3-fl02001-002-1.jpg"},
{name:"bio flexion de biceps",price:750000,img:"https://media.nidux.net/pull/600/800/13624/5952-product-67899061d3783-fl02102-001-1.jpg"},
{name:"bio flexion de piernas",price:750000,img:"https://media.nidux.net/pull/600/800/13624/4944-product-67898fe369e1c-fl02106-011-1.jpg"},
{name:"bio mancuernas",price:10000,img:"https://media.nidux.net/pull/600/800/13624/4970-product-66561b7a1606b-fl02502-055.jpg"},
{name:"mancuerna 30lb",price:15000,img:"https://media.nidux.net/pull/600/800/13624/4329-product-66561e15d4454-fl02502-024.jpg"},
{name:"Rack sentadillas",price:540000,img:"img/7.jpg"},
{name:"Máquina pecho",price:680000,img:"img/8.jpg"},
{name:"Máquina dorsal",price:720000,img:"img/9.jpg"},
{name:"Remo sentado",price:610000,img:"img/10.jpg"},
{name:"Curl piernas",price:490000,img:"img/11.jpg"},
{name:"Extensión piernas",price:530000,img:"img/12.jpg"},
{name:"Escaladora",price:810000,img:"img/13.jpg"},
{name:"Poleas",price:880000,img:"img/14.jpg"},
{name:"Abdominal",price:450000,img:"img/15.jpg"},
{name:"Glúteos",price:640000,img:"img/16.jpg"},
{name:"Press hombros",price:700000,img:"img/17.jpg"},
{name:"Hack squat",price:980000,img:"img/18.jpg"},
{name:"Air bike",price:560000,img:"img/19.jpg"},
{name:"Step",price:210000,img:"img/20.jpg"}
];
const grid=document.getElementById("grid");
const saleGrid=document.getElementById("saleGrid");
/* RENDER */
function renderProducts(list=products){
 grid.innerHTML="";
 saleGrid.innerHTML="";
 list.forEach((p,i)=>{
   /* TARJETA NORMAL */
   const card=`
<div class="card" onclick="openProduct(${products.indexOf(p)})">
     ${p.sale?'<div class="sale">REBAJA</div>':""}
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div>
         ${p.sale?`<span class="old">₡${p.price.toLocaleString()}</span>`:""}
<span class="price">₡${(p.sale||p.price).toLocaleString()}</span>
</div>
</div>
<div class="card-overlay">
<button class="view-btn">Ver producto</button>
</div>
</div>
   `;
   grid.innerHTML+=card;
   /* TARJETA REBAJA */
   if(p.sale){
     saleGrid.innerHTML+=`
<div class="carousel-card" onclick="openProduct(${products.indexOf(p)})">
<div class="sale">REBAJA</div>
<img src="${p.img}">
<div class="carousel-info">
<h3>${p.name}</h3>
<span class="old">₡${p.price.toLocaleString()}</span>
<span class="price">₡${p.sale.toLocaleString()}</span>
</div>
</div>
     `;
   }
 });
 startCarousel();
}
/* CARRUSEL AUTOMATICO */
let index=0;
function startCarousel(){
 const track=document.getElementById("saleGrid");
 const cards=track.children.length;
 const visible=5;
 if(cards<=visible) return;
 setInterval(()=>{
   index++;
   if(index>cards-visible){index=0}
   track.style.transform=`translateX(-${index*285}px)`;
 },3000);
}
/* ABRIR PRODUCTO */
function openProduct(i){
const p=products[i];
document.getElementById("productView").innerHTML=`
<img src="${p.img}">
<div>
<h1>${p.name}</h1>
<p>Máquina profesional de gimnasio diseñada para entrenamientos intensivos.</p>
<h2 class="price">₡${(p.sale||p.price).toLocaleString()}</h2>
<button class="buy" onclick="comprar('${p.name}',${p.sale||p.price})">
Comprar ahora
</button>
</div>
`;
showSection("product");
}
/* COMPRAR */
function comprar(nombre,precio){
window.location.href=
"pago.html?producto="+encodeURIComponent(nombre)+"&precio="+precio;
}
/* CAMBIAR SECCION */
function showSection(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
/* BUSCADOR */
document.getElementById("searchInput").addEventListener("input",e=>{
const val=e.target.value.toLowerCase();
const filtered=products.filter(p=>p.name.toLowerCase().includes(val));
renderProducts(filtered);
});
/* INICIO */
renderProducts();
</script>
</body>
</html>
