<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espalda | CRFit Gym</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background: radial-gradient(circle at top,#1c1c1e,#0a0a0a 85%);
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
background:rgba(20,20,20,.7);
backdrop-filter:blur(25px);
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.05);
z-index:100;
}

header h2{ color:#22c55e; }

nav a{
color:#ccc;
margin-left:18px;
text-decoration:none;
}
nav a:hover{ color:#22c55e; }

/* 🔥 HERO MÁS IMPACTANTE */
.hero{
height:520px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("v-gym.jpg") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:3.6rem;
color:#22c55e;
}

.hero p{
font-size:1.1rem;
max-width:800px;
color:#bbb;
margin:auto;
}

/* 🔥 CONTENEDOR MÁS ANCHO */
.container{
max-width:1300px;
margin:auto;
padding:60px 25px;
}

/* 🔥 NIVELES */
.niveles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-bottom:50px;
}

.nivel-card{
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:.35s;
text-align:center;
}

.nivel-card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 15px 50px rgba(34,197,94,.25);
}

.nivel-card.active{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:black;
}

.nivel-card h3{
font-size:1.4rem;
margin-bottom:8px;
}

/* INFO */
.info{
text-align:center;
margin-bottom:40px;
}

.info h2{
color:#22c55e;
font-size:1.9rem;
}

.info p{
max-width:900px;
margin:auto;
color:#bbb;
}

/* 🔥 EJERCICIOS MÁS GRANDES */
.ejercicios{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.ejercicio{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:25px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:.35s;
}

.ejercicio:hover{
transform:translateY(-12px) scale(1.02);
box-shadow:0 20px 60px rgba(0,0,0,.9);
}

.ejercicio img{
width:100%;
height:230px;
object-fit:cover;
}

.content{
padding:22px;
}

.content h3{
font-size:1.25rem;
}

.content span{
color:#22c55e;
font-weight:bold;
}

.content p{
margin-top:10px;
color:#bbb;
}

/* RESPONSIVE */
@media(max-width:700px){

.hero{
height:420px;
}

.hero h1{
font-size:2.2rem;
}

.niveles{
grid-template-columns:1fr;
}

.ejercicios{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<header>
<h2>CRFit Gym</h2>
<nav>
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a href="productos.html">Productos</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Rutina de Espalda </h1>
<p>Desarrolla una espalda ancha, fuerte y definida con entrenamientos progresivos.</p>
</div>
</section>

<main class="container">

<!-- 🔥 NIVELES -->
<div class="niveles">

<div class="nivel-card active" onclick="cambiarNivel('principiante',this)">
<h3>🔥 Principiante</h3>
<p>Base y postura</p>
</div>

<div class="nivel-card" onclick="cambiarNivel('intermedio',this)">
<h3>⚡ Intermedio</h3>
<p>Volumen y fuerza</p>
</div>

<div class="nivel-card" onclick="cambiarNivel('avanzado',this)">
<h3>💀 Avanzado</h3>
<p>Máxima densidad</p>
</div>

</div>

<div class="info" id="info"></div>

<div class="ejercicios" id="ejercicios"></div>

</main>

<footer style="text-align:center;padding:25px;color:#777;">
© 2026 CRFit Gym · Espalda fuerte 🏋️
</footer>

<script>
const data = {
principiante:{
info:{
titulo:"Nivel Principiante",
texto:"Aprende a activar la espalda correctamente y mejora tu postura."
},
ejercicios:[
{nombre:"Jalón al pecho",tipo:"Dorsales",img:"img/espalda1.jpg",desc:"3x12"},
{nombre:"Remo máquina",tipo:"Espalda media",img:"img/espalda2.jpg",desc:"3x12"},
{nombre:"Pullover polea",tipo:"Dorsales",img:"img/espalda3.jpg",desc:"3x15"}
]
},

intermedio:{
info:{
titulo:"Nivel Intermedio",
texto:"Mayor volumen combinando ejercicios compuestos y aislados."
},
ejercicios:[
{nombre:"Remo barra",tipo:"Espalda completa",img:"img/espalda4.jpg",desc:"4x10"},
{nombre:"Jalón cerrado",tipo:"Dorsales",img:"img/espalda5.jpg",desc:"3x12"},
{nombre:"Remo polea",tipo:"Espalda media",img:"img/espalda6.jpg",desc:"3x12"}
]
},

avanzado:{
info:{
titulo:"Nivel Avanzado",
texto:"Alta intensidad para máxima fuerza y densidad muscular."
},
ejercicios:[
{nombre:"Peso muerto",tipo:"Espalda baja",img:"img/espalda7.jpg",desc:"5x5"},
{nombre:"Dominadas",tipo:"Dorsales",img:"img/espalda8.jpg",desc:"4x8"},
{nombre:"Remo T",tipo:"Espalda media",img:"img/espalda9.jpg",desc:"4x8"}
]
}
};

function cambiarNivel(n,el){

document.querySelectorAll(".nivel-card")
.forEach(c=>c.classList.remove("active"));

el.classList.add("active");

document.getElementById("info").innerHTML=`
<h2>${data[n].info.titulo}</h2>
<p>${data[n].info.texto}</p>
`;

document.getElementById("ejercicios").innerHTML=
data[n].ejercicios.map(e=>`
<div class="ejercicio">
<img src="${e.img}">
<div class="content">
<h3>${e.nombre}</h3>
<span>${e.tipo}</span>
<p>${e.desc}</p>
</div>
</div>
`).join("");
}

cambiarNivel("principiante", document.querySelector(".nivel-card"));
</script>

</body>
</html>
