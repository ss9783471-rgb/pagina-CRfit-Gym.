<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | CRFit Gym</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,sans-serif}

body{
background:#0b0b0b;
color:#fff;
}

/* HEADER */
header{
background:rgba(0,0,0,.85);
backdrop-filter:blur(15px);
padding:15px;
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
gap:10px;
position:sticky;
top:0;
z-index:100;
}

.logo{display:flex;align-items:center;gap:10px}
.logo img{height:70px}
.logo span{font-weight:bold;font-size:1.5rem}

/* NAV */
nav{display:flex;gap:15px;flex-wrap:wrap}
nav a{color:white;text-decoration:none;font-weight:bold}

.msg-btn{
background:linear-gradient(135deg,#1db954,#16a34a);
padding:10px 20px;
border-radius:25px;
color:#000;
font-weight:bold;
box-shadow:0 5px 20px rgba(29,185,84,.5);
}

/* BUSCADOR */
.search-box{width:100%;max-width:400px}
.search-box input{
width:100%;
padding:12px;
border-radius:25px;
border:none;
background:#1a1a1a;
color:white;
}

/* TITULOS */
.section-title{
text-align:center;
margin:30px 0 20px;
font-size:24px;
}

/* CARRUSEL */
.sale-carousel{
overflow-x:auto;
padding:10px;
scroll-snap-type:x mandatory;
}
.carousel-track{
display:flex;
gap:15px;
}
.carousel-card{
min-width:250px;
background:#141414;
border-radius:18px;
overflow:hidden;
scroll-snap-align:start;
transition:.3s;
}
.carousel-card:active{transform:scale(.96)}
.carousel-card img{
width:100%;
height:160px;
object-fit:cover;
}
.carousel-info{padding:10px}
.sale{
position:absolute;
background:red;
padding:5px 10px;
border-radius:20px;
font-size:12px;
top:10px;
left:10px;
}
.price{color:#1db954}
.old{text-decoration:line-through;color:#888}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#141414;
border-radius:18px;
overflow:hidden;
position:relative;
transition:.3s;
}
.card:active{transform:scale(.96)}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{padding:10px}

/* OVERLAY TOUCH */
.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:.3s;
}
.card.active .overlay{opacity:1}

.view-btn{
background:#1db954;
padding:10px 20px;
border-radius:25px;
font-weight:bold;
}

/* PRODUCT VIEW */
section{display:none}
section.active{display:block}

.product-view{
padding:20px;
}
.product-view img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.buy{
width:100%;
padding:15px;
background:#1db954;
border:none;
border-radius:25px;
font-weight:bold;
margin-top:15px;
}

.back{
margin:15px;
background:none;
border:none;
color:#1db954;
font-weight:bold;
}

/* RESPONSIVE */
@media(min-width:768px){

.grid{
grid-template-columns:repeat(4,1fr);
}

.product-view{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

}

</style>
</head>

<body>

<header>
<div class="logo">
<img src="logoCRfit.png">
<span>CRFit Gym</span>
</div>

<div class="search-box">
<input id="searchInput" placeholder="Buscar equipos...">
</div>

<nav>
<a href="index.html">Inicio</a>
<a href="rutinas.html">Rutinas</a>
<a class="msg-btn" href="mensajes.html">Enviar mensaje</a>
</nav>
</header>

<section id="catalogo" class="active">

<h2 class="section-title">🔥 Rebajas</h2>
<div class="sale-carousel">
<div class="carousel-track" id="saleGrid"></div>
</div>

<h2 class="section-title">Catálogo</h2>
<div class="grid" id="grid"></div>

</section>

<section id="producto">
<button class="back" onclick="mostrar('catalogo')">← Volver</button>
<div class="product-view" id="view"></div>
</section>

<script>

const products=[
{name:"MultiGym impulse",price:1600000,sale:1400000,img:"https://media.nidux.net/pull/600/800/13624/6278-product-6835e75800bd4-fl02100-001.jpg"},
{name:"cardio caminadora",price:950000,sale:820000,img:"https://media.nidux.net/pull/600/800/13624/6277-product-68ac7d8bd7cd3-fl02001-002-1.jpg"},
{name:"bio flexion de biceps",price:750000,img:"https://media.nidux.net/pull/600/800/13624/5952-product-67899061d3783-fl02102-001-1.jpg"},
{name:"bio flexion de piernas",price:750000,img:"https://media.nidux.net/pull/600/800/13624/4944-product-67898fe369e1c-fl02106-011-1.jpg"},
{name:"bio mancuernas",price:10000,img:"https://media.nidux.net/pull/600/800/13624/4970-product-66561b7a1606b-fl02502-055.jpg"},
{name:"mancuerna 30lb",price:15000,img:"https://media.nidux.net/pull/600/800/13624/4329-product-66561e15d4454-fl02502-024.jpg"},
{name:"Rack sentadillas",price:540000,img:"img/7.jpg"},
{name:"Máquina pecho",price:680000,img:"img/8.jpg"},
{name:"Máquina dorsal",price:720000,img:"img/9.jpg"},
{name:"Remo sentado",price:610000,img:"img/10.jpg"},
{name:"Curl piernas",price:490000,img:"img/11.jpg"},
{name:"Extensión piernas",price:530000,img:"img/12.jpg"},
{name:"Escaladora",price:810000,img:"img/13.jpg"},
{name:"Poleas",price:880000,img:"img/14.jpg"},
{name:"Abdominal",price:450000,img:"img/15.jpg"},
{name:"Glúteos",price:640000,img:"img/16.jpg"},
{name:"Press hombros",price:700000,img:"img/17.jpg"},
{name:"Hack squat",price:980000,img:"img/18.jpg"},
{name:"Air bike",price:560000,img:"img/19.jpg"},
{name:"Step",price:210000,img:"img/20.jpg"}
];

const grid=document.getElementById("grid");
const saleGrid=document.getElementById("saleGrid");

/* RENDER */
function render(list=products){
grid.innerHTML="";
saleGrid.innerHTML="";

/* CARRUSEL (hasta 8 rebajas) */
products.filter(p=>p.sale).slice(0,8).forEach((p,i)=>{
saleGrid.innerHTML+=`
<div class="carousel-card" onclick="abrir(${i})">
<img src="${p.img}">
<div class="carousel-info">
<h4>${p.name}</h4>
<span class="old">₡${p.price.toLocaleString()}</span><br>
<span class="price">₡${p.sale.toLocaleString()}</span>
</div>
</div>`;
});

/* GRID */
list.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card" onclick="activar(this)">
<img src="${p.img}">
<div class="card-content">
<h4>${p.name}</h4>
<p class="price">₡${(p.sale||p.price).toLocaleString()}</p>
</div>

<div class="overlay" onclick="ver(event,${i})">
<div class="view-btn">Ver producto</div>
</div>
</div>`;
});
}

/* ACTIVAR TARJETA */
function activar(card){
document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
card.classList.add("active");
}

/* VER PRODUCTO */
function ver(e,i){
e.stopPropagation();
const p=products[i];

view.innerHTML=`
<img src="${p.img}">
<div>
<h2>${p.name}</h2>
<p>Equipo profesional para gimnasio</p>
<h3 class="price">₡${(p.sale||p.price).toLocaleString()}</h3>

<button class="buy" onclick="comprar('${p.name}',${p.sale||p.price})">
Comprar ahora
</button>
</div>
`;

mostrar("producto");
}

/* ABRIR DESDE CARRUSEL */
function abrir(i){ver(new Event("click"),i)}

/* COMPRAR */
function comprar(nombre,precio){
window.location.href=`pago.html?producto=${encodeURIComponent(nombre)}&precio=${precio}`;
}

/* CAMBIAR SECCION */
function mostrar(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
window.scrollTo(0,0);
}

/* BUSCAR */
searchInput.addEventListener("input",e=>{
const val=e.target.value.toLowerCase();
const f=products.filter(p=>p.name.toLowerCase().includes(val));
render(f);
});

/* INICIO */
render();

</script>

</body>
</html>
