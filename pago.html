<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago | CRFit Gym</title>
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}
body{
background:#0b0b0b;
color:white;
min-height:100vh;
}
/* HEADER */
header{
background:#000;
padding:15px 40px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}
.logo{
display:flex;
align-items:center;
gap:10px;
}
.logo img{
height:70px;
}
.logo span{
font-size:1.4rem;
font-weight:bold;
}
/* CONTENEDOR */
.checkout{
max-width:1100px;
margin:50px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:20px;
}
/* RESUMEN */
.summary{
background:#141414;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.7);
}
.summary h2{
margin-bottom:20px;
}
.item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}
.total{
margin-top:20px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
color:#1db954;
}
/* FORM */
.payment{
background:#141414;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.7);
}
.input{
margin-bottom:15px;
}
.input label{
font-size:13px;
display:block;
margin-bottom:4px;
}
.input input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#1f1f1f;
color:white;
}
.row{
display:flex;
gap:10px;
}
.pay-btn{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#1db954;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
.pay-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(29,185,84,.6);
}
/* PROCESANDO */
.processing{
display:none;
text-align:center;
padding:60px;
}
.spinner{
width:60px;
height:60px;
border:5px solid #222;
border-top:5px solid #1db954;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
}
@keyframes spin{
to{transform:rotate(360deg)}
}
/* RESULTADO */
.result{
display:none;
text-align:center;
padding:50px;
}
.result h2{
color:#1db954;
font-size:28px;
margin-bottom:10px;
}
/* FACTURA */
.invoice{
margin-top:40px;
max-width:600px;
margin-left:auto;
margin-right:auto;
background:#141414;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.7);
text-align:left;
}
.invoice h3{
margin-bottom:20px;
}
.invoice-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}
.invoice-total{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#1db954;
display:flex;
justify-content:space-between;
}
@media(max-width:900px){
.checkout{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>
<header>
<div class="logo">
<img src="logoCRfit.png">
<span>CRFit Gym</span>
</div>
</header>
<div class="checkout" id="checkout">
<div class="summary">
<h2>Resumen del pedido</h2>
<div class="item">
<span id="productName"></span>
<span id="productPrice"></span>
</div>
<div class="item">
<span>Impuesto (13%)</span>
<span id="tax"></span>
</div>
<div class="total">
<span>Total</span>
<span id="total"></span>
</div>
</div>
<div class="payment">
<h2>Información de pago</h2>
<div class="input">
<label>Nombre en la tarjeta</label>
<input>
</div>
<div class="input">
<label>Número de tarjeta</label>
<input>
</div>
<div class="row">
<div class="input">
<label>Expiración</label>
<input placeholder="MM/AA">
</div>
<div class="input">
<label>CVV</label>
<input>
</div>
</div>
<div class="input">
<label>Correo electrónico</label>
<input>
</div>
<button class="pay-btn" onclick="pagar()">
Pagar ahora
</button>
</div>
</div>
<div class="processing" id="processing">
<h2>Procesando pago...</h2>
<div class="spinner"></div>
</div>
<div class="result" id="result">
<h2>🎉 ¡Pago realizado con éxito!</h2>
<p>Gracias por comprar en CRFit Gym.</p>
<div class="invoice">
<h3>Factura</h3>
<div class="invoice-item">
<span>Producto</span>
<span id="invoiceProduct"></span>
</div>
<div class="invoice-item">
<span>Precio</span>
<span id="invoicePrice"></span>
</div>
<div class="invoice-item">
<span>Impuesto</span>
<span id="invoiceTax"></span>
</div>
<div class="invoice-total">
<span>Total pagado</span>
<span id="invoiceTotal"></span>
</div>
<div class="invoice-item">
<span>Pedido</span>
<span id="order"></span>
</div>
<div class="invoice-item">
<span>Fecha</span>
<span id="date"></span>
</div>
</div>
</div>
<script>
const params=new URLSearchParams(window.location.search)
const producto=params.get("producto")
const precio=Number(params.get("precio"))
const impuesto=Math.round(precio*0.13)
const total=precio+impuesto
productName.textContent=producto
productPrice.textContent="₡"+precio.toLocaleString()
tax.textContent="₡"+impuesto.toLocaleString()
total.textContent="₡"+total.toLocaleString()
function pagar(){
checkout.style.display="none"
processing.style.display="block"
setTimeout(()=>{
processing.style.display="none"
result.style.display="block"
invoiceProduct.textContent=producto
invoicePrice.textContent="₡"+precio.toLocaleString()
invoiceTax.textContent="₡"+impuesto.toLocaleString()
invoiceTotal.textContent="₡"+total.toLocaleString()
order.textContent="#"+Math.floor(Math.random()*900000+100000)
const hoy=new Date()
date.textContent=hoy.toLocaleDateString()
},2500)
}
</script>
</body>
</html>
